<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CapGen Forms</title>
</head>
<body>
  <!-- Netlify form detection file. This page is not linked publicly. -->
  <form name="capgen-early-access" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" action="/thank-you.html" hidden>
    <input type="hidden" name="form-name" value="capgen-early-access" />
    <input name="bot-field" />
    <input type="text" name="first_name" />
    <input type="text" name="last_name" />
    <input type="text" name="business_name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="url" name="website" />
    <input type="text" name="city" />
    <input type="text" name="state" />
    <input type="text" name="primary_service" />
    <select name="sam_registered">
      <option>Yes</option>
      <option>No</option>
      <option>Not sure</option>
    </select>
    <select name="knows_naics">
      <option>Yes</option>
      <option>No</option>
      <option>Not sure</option>
    </select>
    <select name="certification_type">
      <option>Small Business</option>
      <option>SDVOSB</option>
      <option>VOSB</option>
      <option>WOSB</option>
      <option>8(a)</option>
      <option>HUBZone</option>
      <option>Minority-Owned</option>
      <option>Not sure</option>
      <option>Other</option>
    </select>
    <textarea name="opportunity_interest"></textarea>
    <input type="checkbox" name="consent" />
    <button type="submit">Submit</button>
  </form>
</body>
</html>
