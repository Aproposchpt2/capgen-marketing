<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | CapGen Early Access</title>
  <meta name="description" content="Thank you for requesting CapGen early access." />
  <style>
    :root{--bg:#050b16;--panel:rgba(15,30,52,.92);--text:#f8fafc;--muted:#a9bbd4;--blue:#3b82f6;--cyan:#22d3ee;--border:rgba(148,163,184,.22);--shadow:0 24px 80px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 18%,rgba(59,130,246,.3),transparent 32%),radial-gradient(circle at 80% 85%,rgba(34,211,238,.12),transparent 30%),linear-gradient(180deg,var(--bg),#020617);padding:24px;line-height:1.6}
    .card{width:min(760px,100%);border:1px solid var(--border);background:var(--panel);border-radius:30px;padding:46px;box-shadow:var(--shadow);text-align:center}
    .logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:grid;place-items:center;margin:0 auto 20px;font-weight:950}
    h1{font-size:clamp(2.2rem,6vw,4.2rem);letter-spacing:-.065em;line-height:1;margin-bottom:16px}
    p{color:var(--muted);font-size:1.08rem;margin:0 auto 28px;max-width:560px}
    .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;padding:13px 18px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--cyan));text-decoration:none;font-weight:850}
    a.secondary{background:rgba(255,255,255,.06);border:1px solid var(--border)}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">CG</div>
    <h1>Thank you.</h1>
    <p>Your CapGen early access request has been received. We will review your information and follow up about the next available match preview opportunity.</p>
    <div class="actions">
      <a href="/">Return to CapGen</a>
      <a class="secondary" href="/privacy.html">Privacy Notice</a>
    </div>
  </main>
</body>
</html>
